[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Proxy /api/* calls to Netlify serverless functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# SPA fallback redirect for React Router / client routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
